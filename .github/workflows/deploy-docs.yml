# Build the Starlight site under website/ and publish to GitHub Pages.
# Requires Settings → Pages → Source = GitHub Actions (enabled for this repo).
name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/deploy-docs.yml'
  # Allows a manual run from the Actions tab (e.g. after first enable).
  workflow_dispatch:

# Least privilege: the default token is read-only. The write scopes needed to publish Pages
# (`pages: write`, `id-token: write`) are granted only to the `deploy` job below — the `build` job
# runs the third-party `withastro/action` and needs nothing beyond `contents: read`.
permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v7

      - name: Install, build, and upload your site
        uses: withastro/action@v6
        with:
          # Nested Astro app (own package.json + lockfile); not an npm workspace.
          path: website

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # The Pages deployment token is scoped to this job only (see top-level note).
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
