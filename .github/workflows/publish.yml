name: Publish Package

# Publishes @reggieofarrell/firestore-orm to npm when a GitHub Release is published.
# Auth uses npm Trusted Publishing (OIDC) â€” no long-lived NPM_TOKEN secret.
# See: https://docs.npmjs.com/trusted-publishers/
#
# Prerequisites (one-time, on npmjs.com after the first manual publish):
#   Package Settings â†’ Trusted Publisher â†’ GitHub Actions
#   - Repository: reggieofarrell/firestore-orm
#   - Workflow filename: publish.yml  (must match this file's name exactly)
#   - Allowed action: npm publish
# After OIDC works: Publishing access â†’ require 2FA and disallow tokens.

on:
  release:
    types: [published]

permissions:
  # Required so the npm CLI can exchange a short-lived GitHub OIDC token
  # for publish rights. Without this, Trusted Publishing cannot authenticate.
  id-token: write
  contents: read

jobs:
  publish:
    name: Test, build, and publish
    runs-on: ubuntu-latest
    # Emulator-backed integration coverage can take longer than unit-only CI jobs.
    timeout-minutes: 20
    # RECOMMENDED: enable a manual approval gate for publishing â€” the one operation where a
    # deliberate final sign-off is worth the friction. Create a GitHub Environment named `npm` with
    # required reviewers, wire it into the Trusted Publisher config on npmjs.com, then uncomment:
    # environment: npm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          # Pin via .nvmrc (Node 24) so publish matches local/dev CI. Node 24
          # ships npm â‰Ą 11.5.1, which Trusted Publishing (OIDC) requires.
          # setup-node@v7 no longer exports a dummy NODE_AUTH_TOKEN that would
          # otherwise intercept the OIDC publish flow when registry-url is set.
          node-version-file: .nvmrc
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      # Bind the publish to the intended release identity BEFORE doing any work:
      #  - refuse prereleases (GitHub's `published` event fires for prereleases too, and a bare
      #    `npm publish` would tag them `latest`); route prereleases to an explicit dist-tag instead;
      #  - require the GitHub tag to equal `v${package.json.version}` so a mismatched tag/manifest
      #    (e.g. a `v3.0.0-rc.1` release on a tree whose manifest is `3.0.0`) cannot publish stable.
      # Release fields are read via env (not inlined into the script) to avoid injection.
      - name: Verify release identity
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          IS_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          VERSION="v$(node -p "require('./package.json').version")"
          if [ "$IS_PRERELEASE" = "true" ]; then
            echo "::error::Refusing to publish prerelease '$RELEASE_TAG' as latest. Use an explicit dist-tag." && exit 1
          fi
          if [ "$RELEASE_TAG" != "$VERSION" ]; then
            echo "::error::Release tag '$RELEASE_TAG' does not match package.json version '$VERSION'." && exit 1
          fi
          echo "Release identity OK: tag=$RELEASE_TAG version=$VERSION prerelease=$IS_PRERELEASE"

      # Firestore emulator (firebase emulators:exec) needs a JRE. Same setup
      # as the integration matrix job in tests.yml â€” without this, coverage:all fails.
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          # firebase-tools@15 will require JDK 21+ for the Firestore emulator.
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      # release:verify runs docs:build (website build), which needs the website's own deps.
      - name: Install website dependencies
        run: npm --prefix website ci

      # Single canonical release gate â€” the SAME command PR CI is definitionally equivalent to
      # (see tests.yml). Runs: lint, type tests, manifest/lockfile agreement, runtime-only audit,
      # build, tarball allowlist + express-free root graph, packed ESM/CJS/express consumer
      # (compile + runtime load), dual-suite coverage gates, doc-link check, and website build.
      # See package.json `release:verify` and docs/development/testing.md.
      - name: Release verify
        env:
          CI: true
        run: npm run release:verify

      # release:verify's packed-consumer check runs against the dev peer only (Admin 14). Exercise the
      # full DECLARED range here too so the publish gate is not weaker than PR CI â€” this + the PR
      # `admin-compat` matrix are the canonical Admin coverage. release:verify already built dist/.
      - name: Admin 12/13/14 packed-consumer
        run: |
          for v in "^12.0.0" "^13.0.0" "^14.0.0"; do
            echo "--- firebase-admin $v ---"
            FIRESTORE_ORM_ADMIN_VERSION="$v" npm run check:consumer
          done

      # No NODE_AUTH_TOKEN â€” the npm CLI detects the OIDC environment and
      # authenticates via Trusted Publishing. Provenance is attached automatically
      # for public packages from public repos.
      - name: Publish to npm
        run: npm publish
