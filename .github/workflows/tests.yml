name: Tests

# Dual per-suite coverage gates — see docs/development/testing.md and
# scripts/check-coverage-gates.mjs. Merged LCOV is not used as a gate.

on:
  pull_request:
    branches:
      - main

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.label }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Unit tests (coverage)
            key: unit
            coverage_script: test:unit:coverage
            gate_script: test:coverage:gate:unit
            needs_java: false
          - label: Integration tests (coverage)
            key: integration
            coverage_script: test:integration:coverage
            gate_script: test:coverage:gate:integration
            needs_java: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          # Pin via .nvmrc (Node 24) so CI matches local/dev and ships npm ≥ 11.5.1.
          node-version-file: .nvmrc
          cache: npm

      - name: Setup Java
        if: matrix.needs_java
        uses: actions/setup-java@v5
        with:
          # firebase-tools@15 will require JDK 21+ for the Firestore emulator.
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Run ${{ matrix.label }}
        env:
          CI: true
        run: npm run ${{ matrix.coverage_script }}

      - name: Enforce ${{ matrix.key }} coverage gates
        env:
          CI: true
        run: npm run ${{ matrix.gate_script }}

      - name: Upload ${{ matrix.key }} coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.key }}
          path: coverage/${{ matrix.key }}
          if-no-files-found: warn

  docs-links:
    name: Doc links
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc

      # No install needed — the checker uses only Node built-ins.
      - name: Check documentation links
        run: npm run check:docs

  types:
    name: Type checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Type-checks src + *.type-test.ts (the write-input type assertions), which the jest suites
      # cannot verify because ts-jest runs with isolatedModules. See docs/development/testing.md.
      - name: Type-check
        run: npm run test:types

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Format check
        # eslint extends eslint-config-prettier (formatting rules disabled), so `npm run lint` does
        # NOT catch Prettier drift — this mirrors release:verify's `check:format` step (review R8).
        run: npm run check:format
      - name: Lint
        run: npm run lint

  # NOTE: the union of the PR jobs below is kept definitionally equivalent to `npm run release:verify`
  # (which the publish workflow runs as one command) — format, lint, types, manifest, audit, build,
  # package, consumer (ESM/CJS/express, compile + runtime), coverage gates, doc links, and website
  # build. If you change release:verify, mirror it here (and vice versa).

  # Exercises the exact artifact users install: builds, asserts the tarball allowlist + that the root
  # declaration graph is express-free, and checks manifest/lockfile metadata agreement. The isolated
  # packed-consumer compile/runtime check runs per Admin major in the `admin-compat` job below.
  package:
    name: Package (allowlist + manifest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Manifest / lockfile metadata agreement
        run: npm run check:manifest
      - name: Build
        run: npm run build
      - name: Tarball allowlist + express-graph check
        run: npm run check:package

  # Compiles AND runtime-loads a fresh ESM + CJS + /express consumer against the packed tarball, once
  # per DECLARED firebase-admin peer major — so the ^12 || ^13 || ^14 range is tested honestly rather
  # than only against the dev version. check:consumer reads FIRESTORE_ORM_ADMIN_VERSION.
  admin-compat:
    name: Consumer (firebase-admin ${{ matrix.admin }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        admin: ['^12.0.0', '^13.0.0', '^14.0.0']
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Isolated packed-consumer compile + runtime load
        env:
          FIRESTORE_ORM_ADMIN_VERSION: ${{ matrix.admin }}
        run: npm run check:consumer

  # Runtime-only dependency audit (the shipped package declares no runtime deps, so this stays clean;
  # dev-toolchain advisories are informational and excluded via --omit=dev).
  audit:
    name: Audit (runtime deps)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Runtime dependency audit
        run: npm run check:audit

  # Builds the Starlight docs site (release:verify runs this too). Catches broken MDX/links/config
  # that the doc-link checker alone does not.
  docs-build:
    name: Website build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install website dependencies
        run: npm --prefix website ci
      - name: Build website
        run: npm run docs:build

  # Verify build + unit tests on the v3 Node floor (22) in addition to the pinned Node (24) used by
  # the coverage jobs above.
  node22:
    name: Node 22 (build + unit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Unit tests
        run: npm run test:unit
