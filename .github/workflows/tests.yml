name: Tests

on:
  push:
    branches:
      - main
      - master
      - rf/**
  pull_request:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.label }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Unit tests (coverage)
            key: unit
            script: test:unit:coverage
            needs_java: false
          - label: Integration tests (coverage)
            key: integration
            script: test:integration:coverage
            needs_java: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        if: matrix.needs_java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Run ${{ matrix.label }}
        env:
          CI: true
        run: npm run ${{ matrix.script }}

      - name: Upload ${{ matrix.key }} coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.key }}
          path: coverage/${{ matrix.key }}
          if-no-files-found: warn

  merge:
    name: Check coverage thresholds
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download unit coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-unit
          path: coverage/unit

      - name: Download integration coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-integration
          path: coverage/integration

      - name: Merge coverage and enforce thresholds
        env:
          CI: true
        run: npm run test:coverage:merge

      - name: Upload merged coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-merged
          path: coverage/merged
          if-no-files-found: warn
